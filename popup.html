<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TranslateSub AI</title>
    <link rel="stylesheet" href="popup.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo-container">
                <img src="icon.svg" alt="Logo" class="logo-img">
                <div class="logo-text">
                    <h1>TranslateSub AI</h1>
                    <p>Real-time subtitles for any video</p>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="main-view" class="view">
            <div class="status-indicator">
                <div id="status-dot" class="dot"></div>
                <span id="status-label">Idle</span>
            </div>

            <button id="toggle-btn" class="btn-start">
                <span class="btn-content">
                    <span id="btn-icon-container">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-play"><polygon points="6 3 20 12 6 21 6 3"/></svg>
                    </span>
                    <span id="btn-text">Start Subtitles</span>
                </span>
            </button>

            <div class="latency-info">
                <div class="latency-left">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    <span>Latency</span>
                </div>
                <span id="latency-val">—</span>
            </div>
        </main>

        <!-- Settings View -->
        <main id="settings-view" class="view hidden">
            <div class="settings-header">
                <button id="back-btn" class="icon-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <h3>Subtitle Settings</h3>
            </div>

            <div class="preview-container">
                <div id="subtitle-preview" class="subtitle-preview">
                    The quick brown fox jumps over the lazy dog.
                </div>
            </div>
            
            <div class="settings-group">
                <div class="setting-item">
                    <div class="label-row">
                        <label>Font Size</label>
                        <span id="font-size-val">18px</span>
                    </div>
                    <input type="range" id="font-size-slider" min="12" max="32" value="18">
                </div>

                <div class="setting-item">
                    <div class="label-row">
                        <label>Font Family</label>
                    </div>
                    <select id="font-family-select">
                        <option value="Inter, sans-serif">Inter (Default)</option>
                        <option value="'Segoe UI', Tahoma, sans-serif">Segoe UI</option>
                        <option value="'Roboto', sans-serif">Roboto</option>
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="'Courier New', monospace">Monospace</option>
                        <option value="Georgia, serif">Serif</option>
                    </select>
                </div>

                <div class="setting-item">
                    <div class="label-row">
                        <label>Font Color</label>
                    </div>
                    <div class="color-picker-container">
                        <input type="color" id="font-color-picker" value="#ffffff">
                        <span id="font-color-val">#ffffff</span>
                    </div>
                </div>

                <div class="setting-item">
                    <div class="label-row">
                        <label>Background Opacity</label>
                        <span id="opacity-val">85%</span>
                    </div>
                    <input type="range" id="opacity-slider" min="0" max="100" value="85">
                </div>

                <div class="setting-item">
                    <div class="label-row">
                        <label>Background Color</label>
                    </div>
                    <div class="color-picker-container">
                        <input type="color" id="bg-color-picker" value="#000000">
                        <span id="bg-color-val">#000000</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <button id="nav-main" class="nav-btn active">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-home"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                <span>Home</span>
            </button>
            <button id="nav-settings" class="nav-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-settings"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                <span>Settings</span>
            </button>
        </footer>
    </div>
    <script src="popup.js"></script>
</body>
</html>
